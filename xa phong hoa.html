<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Phản Ứng Xà Phòng Hoá</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for all animated elements */
        .animated-svg {
            transition: all 1s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4 font-sans text-slate-800">

    <!-- Header Section -->
    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold mb-2">Mô Phỏng Phản Ứng Xà Phòng Hoá</h1>
            <p class="text-blue-100 text-lg font-mono tracking-wide bg-blue-700/50 inline-block px-4 py-1 rounded-full">
                (RCOO)₃C₃H₅ + 3NaOH <span class="mx-2">stackrel t° →</span> C₃H₅(OH)₃ + 3RCOONa
            </p>
        </div>

        <!-- Interactive Canvas Area -->
        <div class="relative w-full overflow-x-auto flex justify-center bg-slate-50 border-b border-slate-200">
            <svg viewBox="0 0 800 400" class="w-full max-w-[800px] h-auto drop-shadow-sm">
                <defs>
                    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                        <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.15" />
                    </filter>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="5" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>

                <!-- Background elements -->
                <rect x="0" y="0" width="800" height="400" fill="#f8fafc" rx="10" />
                <text x="400" y="380" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">Mô hình phân tử đơn giản hoá</text>

                <!-- --- BONDS (Rendered behind molecules) --- -->
                <g id="bonds-group"></g>

                <!-- --- MOLECULES --- -->
                
                <!-- Glycerol Backbone -->
                <g id="glycerol-backbone" class="animated-svg" filter="url(#shadow)">
                    <rect x="-35" y="-110" width="70" height="220" rx="35" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
                    <text x="0" y="-75" fill="#1e293b" font-size="16" text-anchor="middle" font-weight="bold">CH₂</text>
                    <text x="0" y="5" fill="#1e293b" font-size="16" text-anchor="middle" font-weight="bold">CH</text>
                    <text x="0" y="85" fill="#1e293b" font-size="16" text-anchor="middle" font-weight="bold">CH₂</text>
                    <line x1="25" y1="-80" x2="60" y2="-80" stroke="#1e293b" stroke-width="3" />
                    <line x1="25" y1="0" x2="60" y2="0" stroke="#1e293b" stroke-width="3" />
                    <line x1="25" y1="80" x2="60" y2="80" stroke="#1e293b" stroke-width="3" />
                    <circle cx="60" cy="-80" r="14" fill="#ef4444" />
                    <text x="60" y="-75" fill="white" font-size="14" text-anchor="middle" font-weight="bold">O</text>
                    <circle cx="60" cy="0" r="14" fill="#ef4444" />
                    <text x="60" y="5" fill="white" font-size="14" text-anchor="middle" font-weight="bold">O</text>
                    <circle cx="60" cy="80" r="14" fill="#ef4444" />
                    <text x="60" y="85" fill="white" font-size="14" text-anchor="middle" font-weight="bold">O</text>
                </g>

                <!-- Labels for Glycerol/Triglyceride -->
                <text id="triglyceride-label" class="animated-svg" fill="#64748b" font-size="16" font-weight="bold" text-anchor="middle">Triglyceride</text>
                <text id="glycerol-label" class="animated-svg" fill="#10b981" font-size="18" font-weight="bold" text-anchor="middle">Glycerol</text>

                <!-- Fatty Acid Chains & NaOH will be injected here via JS to keep HTML clean -->
                <g id="molecules-group"></g>

                <!-- NaOH Label -->
                <text id="naoh-label" x="700" y="70" class="animated-svg" fill="#3b82f6" font-size="16" font-weight="bold" text-anchor="middle">3 × NaOH</text>

            </svg>
        </div>

        <!-- Step Information -->
        <div class="bg-white p-6 border-b border-slate-100 min-h-[140px]">
            <h2 id="step-title" class="text-xl font-bold text-blue-700 mb-2"></h2>
            <p id="step-desc" class="text-slate-600 text-lg leading-relaxed"></p>
        </div>

        <!-- Controls -->
        <div class="bg-slate-50 p-4 flex flex-wrap items-center justify-between gap-4">
            
            <!-- Progress Bar -->
            <div class="flex-1 max-w-xs flex items-center gap-2" id="progress-container">
                <!-- Progress bars generated by JS -->
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3">
                <button onclick="resetSim()" class="p-2 rounded-full hover:bg-slate-200 text-slate-600 transition-colors" title="Làm lại">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                
                <button id="btn-prev" onclick="stepPrev()" class="p-2 rounded-full hover:bg-slate-200 text-slate-600 disabled:opacity-50 transition-colors" title="Bước trước">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="4"/><polygon points="14,20 4,12 14,4"/></svg>
                </button>

                <button onclick="togglePlay()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-bold shadow-md hover:shadow-lg transition-all flex items-center gap-2">
                    <span id="play-icon"></span>
                    <span id="play-text">Tự động phát</span>
                </button>

                <button id="btn-next" onclick="stepNext()" class="p-2 rounded-full hover:bg-slate-200 text-slate-600 disabled:opacity-50 transition-colors" title="Bước tiếp theo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="4" x2="6" y2="20"/><polygon points="10,4 20,12 10,20"/></svg>
                </button>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        // Data and State
        let currentStep = 0;
        let isPlaying = false;
        let timer = null;

        const stepInfo = [
            {
                title: "1. Chuẩn bị chất tham gia",
                desc: "Triglyceride (chất béo) và 3 phân tử Kiềm (NaOH) được chuẩn bị. Triglyceride gồm gốc glycerol liên kết với 3 gốc axit béo qua các liên kết este."
            },
            {
                title: "2. Tiếp cận & Tấn công",
                desc: "Dưới tác dụng của nhiệt độ, các phân tử NaOH tiến lại gần. Nhóm hydroxide (-OH) chuẩn bị tấn công vào nguyên tử carbon của nhóm carbonyl (C=O)."
            },
            {
                title: "3. Cắt đứt liên kết",
                desc: "Liên kết este giữa gốc glycerol và axit béo bị đứt gãy. NaOH phân tách thành ion Na+ và OH- để chuẩn bị trao đổi."
            },
            {
                title: "4. Trao đổi nhóm nguyên tử",
                desc: "Nguyên tử H (từ nhóm OH) gắn vào nguyên tử O của gốc glycerol. Phần -ONa gắn vào nguyên tử C của gốc axit béo."
            },
            {
                title: "5. Hoàn tất phản ứng",
                desc: "Phản ứng xà phòng hoá kết thúc! Ta thu được 1 phân tử Glycerol và 3 phân tử muối natri của axit béo (Xà phòng)."
            }
        ];

        function getPositions(step) {
            const Y1 = 120, Y2 = 200, Y3 = 280;
            switch(step) {
                case 0:
                    return { bbX: 100, bbY: 200, chainX: [190, 190, 190], chainY: [Y1, Y2, Y3], naoX: [650, 650, 650], naoY: [Y1, Y2, Y3], hX: [625, 625, 625], hY: [Y1, Y2, Y3] };
                case 1:
                    return { bbX: 100, bbY: 200, chainX: [190, 190, 190], chainY: [Y1, Y2, Y3], naoX: [250, 250, 250], naoY: [Y1 + 30, Y2 + 30, Y3 + 30], hX: [225, 225, 225], hY: [Y1 + 30, Y2 + 30, Y3 + 30] };
                case 2:
                    return { bbX: 60, bbY: 200, chainX: [280, 280, 280], chainY: [Y1, Y2, Y3], naoX: [250, 250, 250], naoY: [Y1 + 30, Y2 + 30, Y3 + 30], hX: [160, 160, 160], hY: [Y1 + 20, Y2 + 20, Y3 + 20] };
                case 3:
                    return { bbX: 60, bbY: 200, chainX: [280, 280, 280], chainY: [Y1, Y2, Y3], naoX: [255, 255, 255], naoY: [Y1, Y2, Y3], hX: [145, 145, 145], hY: [Y1, Y2, Y3] };
                case 4:
                    return { bbX: 150, bbY: 200, chainX: [450, 450, 450], chainY: [80, 200, 320], naoX: [425, 425, 425], naoY: [80, 200, 320], hX: [235, 235, 235], hY: [120, 200, 280] };
                default:
                    return getPositions(0);
            }
        }

        // Initialize DOM Elements
        function initDOM() {
            // Generate Bonds
            const bondsGroup = document.getElementById('bonds-group');
            let bondsHTML = '';
            for(let i=0; i<3; i++) {
                bondsHTML += `
                    <line id="ester-bond-${i}" class="animated-svg" stroke="#475569" stroke-width="4" stroke-linecap="round"></line>
                    <line id="naoh-bond-${i}" class="animated-svg" stroke="#475569" stroke-width="4" stroke-linecap="round"></line>
                    <line id="glyc-bond-${i}" class="animated-svg" stroke="#475569" stroke-width="4" stroke-linecap="round"></line>
                    <line id="soap-bond-${i}" class="animated-svg" stroke="#475569" stroke-width="4" stroke-linecap="round"></line>
                `;
            }
            bondsGroup.innerHTML = bondsHTML;

            // Generate Molecules
            const molGroup = document.getElementById('molecules-group');
            let molHTML = '';
            for(let i=0; i<3; i++) {
                molHTML += `
                    <!-- Fatty Acid Chain ${i} -->
                    <g id="chain-${i}" class="animated-svg" filter="url(#shadow)">
                        <path d="M14,0 L30,20 L50,0 L70,20 L90,0 L110,20 L130,0 L150,20" stroke="#f59e0b" fill="none" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                        <text x="165" y="5" fill="#d97706" font-size="16" font-weight="bold">R</text>
                        <line x1="-4" y1="-12" x2="-4" y2="-32" stroke="#1e293b" stroke-width="3" />
                        <line x1="4" y1="-12" x2="4" y2="-32" stroke="#1e293b" stroke-width="3" />
                        <circle cx="0" cy="-38" r="12" fill="#ef4444" />
                        <text x="0" y="-33" fill="white" font-size="12" text-anchor="middle" font-weight="bold">O</text>
                        <circle cx="0" cy="0" r="16" fill="#9ca3af" stroke="#6b7280" stroke-width="2" />
                        <text x="0" y="5" fill="white" font-size="14" text-anchor="middle" font-weight="bold">C</text>
                        <text id="soap-label-${i}" x="80" y="45" class="animated-svg" fill="#3b82f6" font-size="14" font-weight="bold" text-anchor="middle">Xà phòng</text>
                    </g>
                    <!-- Na-O Component ${i} -->
                    <g id="nao-${i}" class="animated-svg" filter="url(#shadow)">
                        <circle cx="0" cy="0" r="14" fill="#ef4444" />
                        <text x="0" y="5" fill="white" font-size="14" text-anchor="middle" font-weight="bold">O</text>
                        <line x1="14" y1="0" x2="22" y2="0" stroke="#1e293b" stroke-width="3" />
                        <circle cx="38" cy="0" r="16" fill="#3b82f6" />
                        <text x="38" y="5" fill="white" font-size="13" text-anchor="middle" font-weight="bold">Na</text>
                    </g>
                    <!-- H Component ${i} -->
                    <g id="h-${i}" class="animated-svg" filter="url(#shadow)">
                        <circle cx="0" cy="0" r="11" fill="white" stroke="#9ca3af" stroke-width="2" />
                        <text x="0" y="4" fill="#1e293b" font-size="12" text-anchor="middle" font-weight="bold">H</text>
                    </g>
                `;
            }
            molGroup.innerHTML = molHTML;

            // Generate Progress Bar
            const progGroup = document.getElementById('progress-container');
            let progHTML = '';
            for(let i=0; i<5; i++) {
                progHTML += `<div id="prog-${i}" class="h-2 flex-1 rounded-full transition-colors duration-500 bg-slate-200"></div>`;
            }
            progGroup.innerHTML = progHTML;

            // Initial render
            updateSimulation();
        }

        // Core Render Function
        function updateSimulation() {
            const pos = getPositions(currentStep);

            // 1. Update SVG Coordinates and Opacities
            for(let i=0; i<3; i++) {
                // Bonds
                const eb = document.getElementById(`ester-bond-${i}`);
                eb.setAttribute('x1', pos.bbX + 60); eb.setAttribute('y1', pos.bbY - 80 + i * 80);
                eb.setAttribute('x2', pos.chainX[i]); eb.setAttribute('y2', pos.chainY[i]);
                eb.style.opacity = currentStep < 2 ? 1 : 0;

                const nb = document.getElementById(`naoh-bond-${i}`);
                nb.setAttribute('x1', pos.hX[i]); nb.setAttribute('y1', pos.hY[i]);
                nb.setAttribute('x2', pos.naoX[i]); nb.setAttribute('y2', pos.naoY[i]);
                nb.style.opacity = currentStep < 2 ? 1 : 0;

                const gb = document.getElementById(`glyc-bond-${i}`);
                gb.setAttribute('x1', pos.bbX + 60); gb.setAttribute('y1', pos.bbY - 80 + i * 80);
                gb.setAttribute('x2', pos.hX[i]); gb.setAttribute('y2', pos.hY[i]);
                gb.style.opacity = currentStep >= 3 ? 1 : 0;

                const sb = document.getElementById(`soap-bond-${i}`);
                sb.setAttribute('x1', pos.naoX[i]); sb.setAttribute('y1', pos.naoY[i]);
                sb.setAttribute('x2', pos.chainX[i]); sb.setAttribute('y2', pos.chainY[i]);
                sb.style.opacity = currentStep >= 3 ? 1 : 0;

                // Molecules Transformations
                document.getElementById(`chain-${i}`).setAttribute('transform', `translate(${pos.chainX[i]}, ${pos.chainY[i]}) scale(${currentStep === 4 ? 1.05 : 1})`);
                document.getElementById(`nao-${i}`).setAttribute('transform', `translate(${pos.naoX[i]}, ${pos.naoY[i]}) scale(${currentStep === 4 ? 1.05 : 1})`);
                document.getElementById(`h-${i}`).setAttribute('transform', `translate(${pos.hX[i]}, ${pos.hY[i]})`);
                
                // Molecule Labels
                const sLabel = document.getElementById(`soap-label-${i}`);
                sLabel.style.opacity = currentStep === 4 ? 1 : 0;
                if(currentStep === 4) sLabel.setAttribute('filter', 'url(#glow)'); else sLabel.removeAttribute('filter');
            }

            // Backbone & General Labels
            document.getElementById('glycerol-backbone').setAttribute('transform', `translate(${pos.bbX}, ${pos.bbY}) scale(${currentStep === 4 ? 1.05 : 1})`);
            
            const tLabel = document.getElementById('triglyceride-label');
            tLabel.setAttribute('x', pos.bbX + 15); tLabel.setAttribute('y', pos.bbY + 140);
            tLabel.style.opacity = currentStep < 2 ? 1 : 0;

            const gLabel = document.getElementById('glycerol-label');
            gLabel.setAttribute('x', pos.bbX + 15); gLabel.setAttribute('y', pos.bbY + 140);
            gLabel.style.opacity = currentStep === 4 ? 1 : 0;
            if(currentStep === 4) gLabel.setAttribute('filter', 'url(#glow)'); else gLabel.removeAttribute('filter');

            document.getElementById('naoh-label').style.opacity = currentStep === 0 ? 1 : 0;

            // 2. Update UI (Text & Progress)
            document.getElementById('step-title').innerText = stepInfo[currentStep].title;
            document.getElementById('step-desc').innerText = stepInfo[currentStep].desc;

            for(let i=0; i<5; i++) {
                const p = document.getElementById(`prog-${i}`);
                if(currentStep >= i) {
                    p.classList.remove('bg-slate-200'); p.classList.add('bg-blue-600');
                } else {
                    p.classList.add('bg-slate-200'); p.classList.remove('bg-blue-600');
                }
            }

            // 3. Update Buttons
            document.getElementById('btn-prev').disabled = currentStep === 0;
            document.getElementById('btn-next').disabled = currentStep === 4;

            const pIcon = document.getElementById('play-icon');
            const pText = document.getElementById('play-text');
            
            if (isPlaying) {
                pIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
                pText.innerText = "Tạm dừng";
            } else {
                pIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
                pText.innerText = currentStep === 4 ? "Xem lại" : "Tự động phát";
            }
        }

        // Control Logic
        function manageTimer() {
            clearTimeout(timer);
            if (isPlaying && currentStep < 4) {
                timer = setTimeout(() => {
                    currentStep++;
                    updateSimulation();
                    manageTimer();
                }, 2500);
            } else if (currentStep === 4) {
                isPlaying = false;
                updateSimulation();
            }
        }

        function togglePlay() {
            if (currentStep === 4) {
                currentStep = 0;
                isPlaying = true;
            } else {
                isPlaying = !isPlaying;
            }
            updateSimulation();
            manageTimer();
        }

        function stepPrev() {
            isPlaying = false;
            currentStep = Math.max(0, currentStep - 1);
            updateSimulation();
            manageTimer();
        }

        function stepNext() {
            isPlaying = false;
            currentStep = Math.min(4, currentStep + 1);
            updateSimulation();
            manageTimer();
        }

        function resetSim() {
            isPlaying = false;
            currentStep = 0;
            updateSimulation();
            manageTimer();
        }

        // Boot up
        window.onload = initDOM;

    </script>
</body>
</html>
